name = "workers-proxy"
main = "src/index.js"
compatibility_date = "2026-03-20"
compatibility_flags = ["global_fetch_strictly_public"]

[build]
# Run tests first; if they pass, proceed to bundle the interceptor
command = "npm run test && npm run build"
watch_dir = "src"

# This rule allows us to import our raw HTML and JS files as strings in the Worker
[[rules]]
type = "Text"
globs = ["**/*.html", "**/*.raw.js"]
fallbacks = []

[[d1_databases]]
binding = "DB"
database_name = "proxy-db"
database_id = "PASTE_YOUR_DATABASE_ID_HERE"

[[kv_namespaces]]
binding = "CONFIG_KV"
id = "YOUR_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "STATE_BUCKET"
bucket_name = "YOUR_R2_BUCKET_NAME"

# Run at minute 0 of every hour (hourly) to clean up the database
[triggers]
crons = ["0 * * * *"]
