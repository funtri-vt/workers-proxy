<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2 Edge | Secure Search</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --input-bg: #ffffff;
            --input-border: #d1d5db;
            --focus-ring: rgba(59, 130, 246, 0.5);
            --btn-bg: #3b82f6;
            --btn-hover: #2563eb;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --text-color: #f9fafb;
                --text-muted: #9ca3af;
                --input-bg: #1f2937;
                --input-border: #374151;
                --focus-ring: rgba(59, 130, 246, 0.8);
                --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            }
        }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            transition: background 0.3s, color 0.3s; 
        }

        .hero { text-align: center; margin-bottom: 2rem; }
        .hero h1 { font-size: 2.5rem; margin: 0; font-weight: 800; letter-spacing: -0.025em; }
        .hero h1 span { color: var(--btn-bg); }
        .hero p { color: var(--text-muted); font-size: 1.1rem; margin-top: 0.5rem; }

        .omnibox-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 600px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 9999px; /* Pill shape */
            padding: 5px;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
        }

        .omnibox-wrapper:focus-within {
            border-color: var(--btn-bg);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        .search-icon {
            margin-left: 15px;
            color: var(--text-muted);
            width: 20px;
            height: 20px;
        }

        input { 
            flex: 1; 
            padding: 12px 15px; 
            background: transparent; 
            color: var(--text-color); 
            border: none; 
            font-size: 1.1rem; 
            outline: none; 
        }

        input::placeholder { color: var(--text-muted); }

        button { 
            padding: 12px 24px; 
            background: var(--btn-bg); 
            color: white; 
            border: none; 
            border-radius: 9999px; 
            font-size: 1rem; 
            font-weight: 600;
            cursor: pointer; 
            transition: background 0.2s; 
        }

        button:hover { background: var(--btn-hover); }
    </style>
</head>
<body>

    <div class="hero">
        <h1>V2 <span>Edge</span></h1>
        <p>Enter a web address or search the web securely.</p>
    </div>

    <form id="launcher-form" style="width: 100%; max-width: 600px; padding: 0 20px; box-sizing: border-box;">
        <div class="omnibox-wrapper">
            <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="target-input" placeholder="Search DuckDuckGo or type a URL..." required autocomplete="off" autofocus>
            <button type="submit">Launch</button>
        </div>
    </form>

    <script>
        // Global state for dynamic hash length, defaults to 32 until config is loaded
        let proxyHashLength = 32;

        // Fetch dynamic configuration on page load
        async function fetchSystemConfig() {
            try {
                const res = await fetch('/__admin/api/config');
                if (res.ok) {
                    const config = await res.json();
                    if (config.HASH_LENGTH) {
                        proxyHashLength = parseInt(config.HASH_LENGTH, 10);
                    }
                }
            } catch (err) {
                console.warn('Failed to fetch proxy system config. Using default settings.', err);
            }
        }
        
        // Initiate config load immediately
        fetchSystemConfig();

        document.getElementById('launcher-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const inputVal = document.getElementById('target-input').value.trim();
            if (!inputVal) return;

            let targetUrlStr = "";

            // OMNIBOX LOGIC: Determine if it's a Search or a URL
            // If it has spaces, it's definitively a search.
            if (inputVal.includes(' ')) {
                targetUrlStr = 'https://duckduckgo.com/?q=' + encodeURIComponent(inputVal);
            } 
            // If it starts with http/https, or looks like a domain (has a dot, no spaces), treat as URL.
            else if (/^(https?:\/\/)/i.test(inputVal) || /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}/.test(inputVal) || /^\d{1,3}(\.\d{1,3}){3}/.test(inputVal)) {
                targetUrlStr = inputVal;
                if (!/^https?:\/\//i.test(targetUrlStr)) {
                    targetUrlStr = 'https://' + targetUrlStr;
                }
            } 
            // Fallback: If it's a single word with no dots, search it.
            else {
                targetUrlStr = 'https://duckduckgo.com/?q=' + encodeURIComponent(inputVal);
            }

            // Standard Proxy Routing Logic
            const parsedUrl = new URL(targetUrlStr);
            const targetDomain = parsedUrl.host; 
            
            // Generate alias hash using the dynamically fetched length
            const data = new TextEncoder().encode(targetDomain);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashHex = Array.from(new Uint8Array(hashBuffer))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('')
                .substring(0, proxyHashLength);

            const encodedDomain = btoa(targetDomain);
            const proxyBase = window.location.hostname;
            
            const proxyUrl = new URL(parsedUrl.pathname + parsedUrl.search + parsedUrl.hash, `https://${hashHex}.${proxyBase}`);
            proxyUrl.searchParams.set('__ptarget', encodedDomain);

            window.location.href = proxyUrl.toString();
        });
    </script>
</body>
</html>
